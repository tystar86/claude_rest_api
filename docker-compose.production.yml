services:
  blogit_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - blogit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blogit_internal

  blogit_backend:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set}/blogit-backend:${BLOGIT_IMAGE_TAG:?BLOGIT_IMAGE_TAG must be set}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      blogit_db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; req = urllib.request.Request('http://127.0.0.1:8000/api/auth/csrf/', headers={'Host': 'blog-it.tystar.cz', 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req, timeout=5)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blogit_internal
      - edge

  blogit_frontend:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set}/blogit-frontend:${BLOGIT_IMAGE_TAG:?BLOGIT_IMAGE_TAG must be set}
    restart: unless-stopped
    depends_on:
      blogit_backend:
        condition: service_started
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blogit_internal
      - edge

volumes:
  blogit_postgres_data:

networks:
  blogit_internal:
  edge:
    external: true
