# Local development only — full stack: Postgres + Django runserver + Vite dev server.
#
# Production does not use this file. The hosted backend is built from Dockerfile.backend
# and runs Gunicorn via start.sh; deployment for this repo is defined in render.yaml
# (Render). See docs/developers/START_HERE.md and the root README.
#
services:
  db:
    image: postgres:16-alpine
    container_name: claude_rest_api_db
    environment:
      POSTGRES_DB: claude_rest_api
      POSTGRES_USER: claude_rest_api
      POSTGRES_PASSWORD: claude_rest_api
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude_rest_api -d claude_rest_api"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: claude_rest_api_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      DB_NAME: claude_rest_api
      DB_USER: claude_rest_api
      DB_PASSWORD: claude_rest_api
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://0.0.0.0:5173"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://0.0.0.0:5173"
      UV_CACHE_DIR: "/tmp/uv-cache"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    # TTY + stdin so pdb/breakpoint() is usable via: docker attach claude_rest_api_backend
    stdin_open: true
    tty: true
    # --nothreading: request handler must not run on a worker thread for pdb.
    # --noreload: autoreloader forks a child; pdb runs there while docker attach targets PID 1 — stdin never reaches pdb.
    command: sh -c "uv sync --frozen && python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --nothreading --noreload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: claude_rest_api_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "[ ! -f node_modules/.package-lock.json ] && npm ci; npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
