services:
  - type: web
    name: claude-rest-api-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      # Neon PostgreSQL — fill these in from your Neon dashboard
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_CONN_MAX_AGE
        value: "60"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://claude-rest-api.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://claude-rest-api.vercel.app"
      - key: LOGIN_REDIRECT_URL
        value: "https://claude-rest-api.vercel.app/dashboard"
      - key: LOGOUT_REDIRECT_URL
        value: "https://claude-rest-api.vercel.app/dashboard"

      # Security
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"

      - key: ACCOUNT_DEFAULT_HTTP_PROTOCOL
        value: "https"
      - key: SITE_DOMAIN
        value: "claude-rest-api.onrender.com"

      # Google OAuth (optional)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: CSRF_COOKIE_SAMESITE
        value: None
      - key: SESSION_COOKIE_SECURE
        value: "True"
