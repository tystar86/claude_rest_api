name: Production release

on:
  workflow_dispatch:
    inputs:
      allow_non_master_ref:
        description: "Allow manual runs from non-master refs for SSH/debugging"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: blogit-backend
  FRONTEND_IMAGE_NAME: blogit-frontend
  DJANGO_ENV: testing
  TEST_USE_POSTGRES: "true"
  SECRET_KEY: django-insecure-ci-key
  DEBUG: "False"
  ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
  DB_NAME: blog_test
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: "5432"
  DB_CONN_MAX_AGE: "0"
  SECURE_SSL_REDIRECT: "False"
  SECURE_HSTS_SECONDS: "0"
  SESSION_COOKIE_SECURE: "False"
  CSRF_COOKIE_SECURE: "False"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173"
  PASSWORD_HASHERS: "django.contrib.auth.hashers.MD5PasswordHasher"

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      ghcr_owner: ${{ steps.vars.outputs.ghcr_owner }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Ensure production releases come from master
        run: |
          if [ "${GITHUB_REF_NAME}" != "master" ] && [ "${{ inputs.allow_non_master_ref }}" != "true" ]; then
            echo "Production releases must be run from master. Selected ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Running with allow_non_master_ref=true on ${GITHUB_REF_NAME} for debugging."
          fi

      - name: Compute image tags
        id: vars
        run: |
          echo "ghcr_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

  backend-tests:
    name: Backend tests and formatting
    needs: prepare
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blog_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest tests/unit/

      - name: Check formatting
        run: uv run pre-commit run --all-files

  frontend-tests:
    name: Frontend tests and lint
    needs: prepare
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Run ESLint
        run: npm run lint

  build-and-push:
    name: Build and push release images
    needs:
      - prepare
      - backend-tests
      - frontend-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ghcr_owner }}/${{ env.BACKEND_IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ghcr_owner }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=blogit-backend
          cache-to: type=gha,mode=max,scope=blogit-backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend.production
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_URL=/api
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ghcr_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ghcr_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=blogit-frontend
          cache-to: type=gha,mode=max,scope=blogit-frontend

  deploy:
    name: Deploy to production VPS
    needs:
      - prepare
      - build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          PORT="${VPS_PORT:-22}"
          install -m 700 -d "$HOME/.ssh"
          install -m 600 /dev/null "$HOME/.ssh/known_hosts"
          if [ "$PORT" = "22" ]; then
            HOST_PATTERN="$VPS_HOST"
          else
            HOST_PATTERN="[$VPS_HOST]:$PORT"
          fi
          printf '%s %s\n' "$HOST_PATTERN" "$VPS_HOST_KEY" > "$HOME/.ssh/known_hosts"

      - name: Write release env file
        run: |
          printf 'GHCR_OWNER=%s\nBLOGIT_IMAGE_TAG=%s\n' \
            '${{ needs.prepare.outputs.ghcr_owner }}' \
            '${{ needs.prepare.outputs.image_tag }}' \
            > "$RUNNER_TEMP/blogit.release.env"

      - name: SSH preflight debug
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          PORT="${VPS_PORT:-22}"
          echo "VPS_HOST=$VPS_HOST"
          echo "VPS_PORT=$PORT"
          echo "VPS_USER=$VPS_USER"
          echo "VPS_DEPLOY_PATH=$VPS_DEPLOY_PATH"
          echo "SSH directory state:"
          ls -ld "$HOME/.ssh"
          ls -l "$HOME/.ssh"
          echo "Deploy key fingerprint:"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" > "$RUNNER_TEMP/deploy_key.pub"
          ssh-keygen -lf "$RUNNER_TEMP/deploy_key.pub"
          echo "Pinned host key fingerprint:"
          printf '%s\n' "$VPS_HOST_KEY" > "$RUNNER_TEMP/vps_host_key.pub"
          ssh-keygen -lf "$RUNNER_TEMP/vps_host_key.pub"
          echo "Known hosts entry:"
          cat "$HOME/.ssh/known_hosts"
          echo "DNS resolution:"
          getent ahosts "$VPS_HOST" || true
          echo "TCP connectivity test:"
          if timeout 10 bash -lc "cat < /dev/null > /dev/tcp/$VPS_HOST/$PORT"; then
            echo "TCP connection to $VPS_HOST:$PORT succeeded"
          else
            echo "TCP connection to $VPS_HOST:$PORT failed"
          fi
          echo "Verbose SSH handshake test:"
          set +e
          ssh -vvv \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=yes \
            -i "$HOME/.ssh/id_ed25519" \
            -p "$PORT" \
            "$VPS_USER@$VPS_HOST" \
            "exit"
          SSH_STATUS=$?
          set -e
          echo "SSH preflight exit code: $SSH_STATUS"

      - name: Sync compose and release metadata
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -i "$HOME/.ssh/id_ed25519" -p "$PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_PATH'"
          scp -i "$HOME/.ssh/id_ed25519" -P "$PORT" docker-compose.production.yml "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/docker-compose.production.yml"
          scp -i "$HOME/.ssh/id_ed25519" -P "$PORT" "$RUNNER_TEMP/blogit.release.env" "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/.release.env"

      - name: Pull and restart production services
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          PORT="${VPS_PORT:-22}"
          printf '%s\n' "$GHCR_PULL_TOKEN" | ssh -i "$HOME/.ssh/id_ed25519" -p "$PORT" "$VPS_USER@$VPS_HOST" "
            set -eu
            cd '$VPS_DEPLOY_PATH'
            docker login ghcr.io -u '${{ needs.prepare.outputs.ghcr_owner }}' --password-stdin
            docker compose -f docker-compose.production.yml --env-file .env.production --env-file .release.env pull
            docker compose -f docker-compose.production.yml --env-file .env.production --env-file .release.env up -d --wait
            docker compose -f docker-compose.production.yml --env-file .env.production --env-file .release.env ps
          "
