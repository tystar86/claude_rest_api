name: Security tests

on:
  push:
    branches: [master, testing]
  pull_request:

env:
  DJANGO_ENV: testing
  SECRET_KEY: django-insecure-ci-key
  DEBUG: "False"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  DB_NAME: blog_test
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: "5432"
  DB_CONN_MAX_AGE: "0"
  SECURE_SSL_REDIRECT: "False"
  SECURE_HSTS_SECONDS: "0"
  SESSION_COOKIE_SECURE: "False"
  CSRF_COOKIE_SECURE: "False"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173"
  PASSWORD_HASHERS: "django.contrib.auth.hashers.MD5PasswordHasher"

jobs:
  security-smoke:
    name: Security smoke checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blog_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Apply migrations
        run: |
          uv run python manage.py ensure_sites_migrations
          uv run python manage.py migrate --run-syncdb

      - name: Start Django server
        run: uv run python manage.py runserver 0.0.0.0:8000 &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/dashboard/ && break
            echo "Waiting for server... attempt $i"
            sleep 2
          done

      - name: Run security smoke checks
        run: uv run python tests/security/security_smoke.py --base-url http://localhost:8000

      - name: Run rate-limit burst check
        # Advisory only — pass/fail depends on in-process cache reset timing in CI.
        # A 429 confirms throttling is active; no 429 is a warning, not a hard failure.
        continue-on-error: true
        run: |
          uv run python tests/security/load_burst.py \
            --url http://localhost:8000/api/dashboard/ \
            --requests 250 \
            --concurrency 50
